# Render Blueprint — free Web Service with HTTPS:
#   https://everymarket.onrender.com/callback
#
# Deploy: push this repo to GitHub → Render → New → Blueprint → select repo
# Or: New Web Service → connect repo → name "everymarket" → Docker

services:
  - type: web
    name: everymarket
    runtime: docker
    plan: free
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: APP_HOST
        value: everymarket.onrender.com
      - key: ALIEXPRESS_CALLBACK_URL
        value: https://everymarket.onrender.com/callback
      - key: ALIEXPRESS_API_BASE
        value: https://api-sg.aliexpress.com/rest
      - key: ALIEXPRESS_AUTHORIZE_URL
        value: https://api-sg.aliexpress.com/oauth/authorize
      - key: ALIEXPRESS_TOKEN_PATH
        value: /auth/token/create
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: ALIEXPRESS_APP_KEY
        sync: false
      - key: ALIEXPRESS_APP_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
